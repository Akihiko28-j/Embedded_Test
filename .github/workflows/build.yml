name: Cビルド

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ① ソース取得
      - name: ソースコードを取得
        uses: actions/checkout@v4

      # ② GCC確認
      - name: GCCのバージョンを表示
        run: gcc --version

      # ③ cppcheckインストール
      - name: cppcheckをインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      # ④ 静的解析
      - name: cppcheckで静的解析
        run: |
          cppcheck --enable=all --inconclusive --std=c99 . 2> cppcheck.txt
          cat cppcheck.txt

      # ⑤ ビルド
      - name: converter_tag.c をコンパイル
        run: gcc converter_tag.c -o converter

      # ⑥ ビルド結果確認
      - name: converter存在確認
        run: ls -l converter

      # ⑦ テストファイル確認
      - name: テストファイル確認
        run: ls -l test

      # ⑧ プログラム実行（ここで止める）
      - name: プログラム実行
        run: ./converter test/input.fps output.fps

      # ⑨ output確認（重要）
      - name: output確認
        run: ls -l output.fps

      # ⑩ 出力比較（テスト本体）
      - name: 出力を比較
        run: cmp output.fps test/expected.fps